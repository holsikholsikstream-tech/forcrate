name: Build Winlator APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git

      - name: Download adrenotools
        run: |
          mkdir -p Winlator-Ludashi-2.9/app/src/main/cpp
          git clone --recursive https://github.com/bylaws/libadrenotools
          mv libadrenotools Winlator-Ludashi-2.9/app/src/main/cpp/adrenotools

      - name: Build APK
        run: |
          cd Winlator-Ludashi-2.9
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: winlator-apk
          path: Winlator-Ludashi-2.9/app/build/outputs/apk/debug/app-debug.apk
